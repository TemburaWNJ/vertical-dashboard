<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320, initial-scale=1.0">
<title>資訊儀表板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(180deg, #0a0a12 0%, #14141e 100%); color: #e8e8f0; min-height: 100vh; padding: 12px; line-height: 1.4; }
h2 { font-size: 16px; margin-bottom: 8px; color: #60a5fa; border-bottom: 1px solid #333; padding-bottom: 4px; }
.section { margin-bottom: 16px; }
.item { background: rgba(255,255,255,0.04); padding: 8px 10px; margin: 4px 0; border-radius: 6px; font-size: 13px; }
.item .title { font-weight: 600; color: #fff; }
.item .meta { font-size: 11px; color: #888; margin-top: 2px; }
.status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.online { background: #22c55e; }
.offline { background: #666; }
.refresh-info { font-size: 11px; color: #555; text-align: center; margin-top: 12px; }
</style>
</head>
<body>
<div class="section"><h2>⚾ MLB 即時資訊</h2><div id="mlb-content"></div></div>
<div class="section"><h2>📈 股市指數</h2><div id="stock-content"></div></div>
<div class="section"><h2>📰 今日新聞</h2><div id="news-content"></div></div>
<div class="section"><h2>🤖 AI 工具狀態</h2>
  <div class="item"><span class="status online"></span>Hermes Agent <span class="meta">Telegram Bot 運行中</span></div>
  <div class="item"><span class="status online"></span>OpenRouter API <span class="meta">key 配置完成</span></div>
  <div class="item"><span class="status offline"></span>Gemini API <span class="meta">NT$400 餘額中</span></div>
</div>
<script>
const mlb = [
  {game: 'Yankees vs Red Sox', status: '7th inning', score: '3-2 NYY'},
  {game: 'Dodgers vs Giants', status: 'Final', score: 'LAD 5, SF 3'},
  {game: 'Cubs vs Cardinals', status: 'Pre-game', score: '19:05 ET'},
];
const stocks = [
  {name: '台灣加權指', value: '22,450.68', change: '+87.42 (+0.4%)', up: true},
  {name: 'NASDAQ', value: '19,845.2', change: '-123.5 (-0.6%)', up: false},
];
const news = [
  {title: 'Google I/O 2026 6/18 登場', source: '科技新報'},
  {title: '美聯儲利率決定引發市場波動', source: '經濟日報'},
  {title: '新北市建案最新動態', source: '本地社報'},
];
function render(id, arr, tmpl) { document.getElementById(id).innerHTML = arr.map(tmpl).join(''); }
render('mlb-content', mlb, m => '<div class="item"><div class="title">'+m.game+'</div><div class="meta">'+m.status+' • '+m.score+'</div></div>');
render('stock-content', stocks, s => '<div class="item"'+(s.up ? '' : ' style="color:#f87171"')+'>'+s.name+' <span style="float:right;font-weight:600">'+s.value+'</span><br><span class="meta">'+s.change+'</span></div>');
render('news-content', news, n => '<div class="item"><div class="title">'+n.title+'</div><div class="meta">'+n.source+'</div></div>');
setTimeout(() => location.reload(), 15 * 60 * 1000);
</script>
<div class="refresh-info">每 15 分鐘自動重整</div>
</body>
</html>
