<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資訊儀表板</title>
<style>
:root {
  --bg: #0d1117;
  --bg-2: #151b24;
  --ink: #f7fbff;
  --muted: rgba(247, 251, 255, .72);
  --soft: rgba(247, 251, 255, .52);
  --line: rgba(255, 255, 255, .12);
  --blue: #0078d7;
  --cyan: #00a4ef;
  --green: #107c10;
  --purple: #744da9;
  --orange: #d83b01;
  --red: #e81123;
  --tile-radius: 2px;
  --gap: clamp(10px, 1.5vw, 18px);
}
* { box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Roboto, sans-serif;
  background:
    radial-gradient(circle at 12% 10%, rgba(0, 120, 215, .20), transparent 28rem),
    radial-gradient(circle at 86% 18%, rgba(116, 77, 169, .18), transparent 24rem),
    linear-gradient(135deg, var(--bg), var(--bg-2));
  color: var(--ink);
  padding: clamp(16px, 3vw, 34px);
  line-height: 1.35;
}
.dashboard {
  width: min(1180px, 100%);
  margin: 0 auto;
}
.header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: clamp(16px, 2.5vw, 28px);
}
.kicker {
  margin: 0 0 6px;
  color: var(--soft);
  font-size: clamp(12px, 1.4vw, 14px);
  letter-spacing: .14em;
  text-transform: uppercase;
}
h1 {
  margin: 0;
  font-weight: 300;
  letter-spacing: -.04em;
  font-size: clamp(34px, 7vw, 78px);
  line-height: .9;
}
.clock {
  text-align: right;
  min-width: 150px;
}
.clock-time {
  font-size: clamp(30px, 5vw, 58px);
  font-weight: 200;
  letter-spacing: -.06em;
  line-height: 1;
}
.clock-date {
  color: var(--muted);
  margin-top: 8px;
  font-size: 14px;
}
.tile-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  grid-auto-rows: minmax(138px, auto);
  gap: var(--gap);
}
.tile {
  position: relative;
  overflow: hidden;
  min-height: 138px;
  padding: clamp(16px, 2vw, 22px);
  border: 1px solid var(--line);
  border-radius: var(--tile-radius);
  color: white;
  box-shadow: 0 20px 70px rgba(0,0,0,.18);
  isolation: isolate;
}
.tile::after {
  content: "";
  position: absolute;
  inset: auto -35% -55% auto;
  width: 180px;
  aspect-ratio: 1;
  border-radius: 999px;
  background: rgba(255,255,255,.12);
  z-index: -1;
}
.tile:hover { filter: brightness(1.06); }
.tile:focus-within { outline: 2px solid rgba(255,255,255,.85); outline-offset: 3px; }
.tile-blue { background: linear-gradient(135deg, #0063b1, var(--blue)); }
.tile-cyan { background: linear-gradient(135deg, #0086b3, var(--cyan)); }
.tile-green { background: linear-gradient(135deg, #0b6a0b, var(--green)); }
.tile-purple { background: linear-gradient(135deg, #51337f, var(--purple)); }
.tile-orange { background: linear-gradient(135deg, #a93600, var(--orange)); }
.tile-red { background: linear-gradient(135deg, #a80000, var(--red)); }
.tile-dark { background: linear-gradient(135deg, #202735, #111827); }
.tile-wide { grid-column: span 2; }
.tile-xl { grid-column: span 3; grid-row: span 2; }
.tile-tall { grid-row: span 2; }
.tile-full { grid-column: span 6; }
.tile-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
  color: rgba(255,255,255,.78);
  font-size: 19px;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.tile-icon { font-size: 22px; letter-spacing: 0; }
.tile-title {
  margin: 0;
  font-size: clamp(22px, 3.2vw, 40px);
  font-weight: 300;
  letter-spacing: -.04em;
  text-wrap: pretty;
}
.tile-value {
  margin-top: 10px;
  font-size: clamp(34px, 6vw, 76px);
  font-weight: 200;
  letter-spacing: -.07em;
  line-height: .95;
}
.tile-note, .meta {
  color: rgba(255,255,255,.74);
  font-size: 14px;
}
.tile-note { margin-top: 12px; }
.list {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}
.list-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 10px 0;
  border-top: 1px solid rgba(255,255,255,.18);
}
.list-title { font-weight: 650; }
.change-up { color: #b7ffbd; }
.change-down { color: #ffd2d6; }
.status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 0;
  border-top: 1px solid rgba(255,255,255,.18);
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: #8b949e;
  box-shadow: 0 0 0 4px rgba(255,255,255,.08);
}
.dot.online { background: #7ee787; }
.dot.warn { background: #f2cc60; }
.footer {
  margin-top: 18px;
  color: var(--soft);
  font-size: 12px;
  display: flex;
  justify-content: space-between;\
  gap: 14px;
  flex-wrap: wrap;
}
@media (max-width: 900px) {
  .tile-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .tile-xl { grid-column: span 4; }
  .tile-full { grid-column: span 4; }
}
@media (max-width: 640px) {
  body { padding: 14px; }
  .header { align-items: start; flex-direction: column; }
  .clock { text-align: left; }
  .tile-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); grid-auto-rows: minmax(126px, auto); }
  .tile, .tile-wide, .tile-xl, .tile-tall, .tile-full { grid-column: span 2; grid-row: auto; }
  .tile.compact { grid-column: span 1; }
}
@media (max-width: 380px) {
  .tile-grid { grid-template-columns: 1fr; }
  .tile, .tile-wide, .tile-xl, .tile-tall, .tile-full, .tile.compact { grid-column: span 1; }
}
@media (prefers-reduced-motion: no-preference) {
  .tile { transition: transform .18s ease, filter .18s ease; }
  .tile:hover { transform: translateY(-2px); }
}
</style>
</head>
<body>
<main class="dashboard">
  <header class="header">
    <div>
      <p class="kicker">Placeholder Dashboard</p>
      <h1>今日資訊</h1>
    </div>
    <div class="clock" aria-label="目前時間">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">載入中</div>
    </div>
  </header>

  <section class="tile-grid" aria-label="資訊方格">
    <article class="tile tile-xl tile-blue">
      <div class="tile-label"><span>MLB</span><span class="tile-icon">⚾</span></div>
      <h2 class="tile-title">Yankees vs Red Sox</h2>
      <div class="tile-value">3–2</div>
      <p class="tile-note">7th inning · NYY 領先</p>
      <div class="list" id="mlb-list"></div>
    </article>

    <article class="tile tile-wide tile-green">
      <div class="tile-label"><span>台股</span><span class="tile-icon">📈</span></div>
      <h2 class="tile-title">台灣加權指</h2>
      <div class="tile-value">22,450</div>
      <p class="tile-note change-up">+87.42 · +0.4%</p>
    </article>

    <article class="tile tile-purple compact">
      <div class="tile-label"><span>NASDAQ</span></div>
      <h2 class="tile-title">19,845</h2>
      <p class="tile-note change-down">-0.6%</p>
    </article>

    <article class="tile tile-orange compact">
      <div class="tile-label"><span>天氣</span><span class="tile-icon">☁</span></div>
      <h2 class="tile-title">新北</h2>
      <div class="tile-value">28°</div>
      <p class="tile-note">午後短暫雨 placeholder</p>
    </article>

    <article class="tile tile-wide tile-cyan">
      <div class="tile-label"><span>今日新聞</span><span class="tile-icon">📰</span></div>
      <h2 class="tile-title">重點摘要</h2>
      <div class="list" id="news-list"></div>
    </article>

    <article class="tile tile-tall tile-dark">
      <div class="tile-label"><span>AI 狀態</span><span class="tile-icon">🤖</span></div>
      <h2 class="tile-title" id="ai-status-title">載入中...</h2>
      <div id="ai-status-meta" class="tile-note"></div>
      <div id="ai-service-list" class="list"></div>
    </article>

    <article class="tile tile-wide tile-red">
      <div class="tile-label"><span>自動排程</span><span class="tile-icon">⏱</span></div>
      <h2 class="tile-title">排程列表</h2>
      <div id="cron-jobs-list" class="list"></div>
    </article>
  </section>

  <footer class="footer">
    <span>版型：Windows Phone / Metro 方格風格 · RWD</span>
    <span id="refresh-info">每 15 分鐘自動重整 · Placeholder data</span>
  </footer>
</main>

<script>
const mlb = [
  {game: 'Dodgers vs Giants', status: 'Final', score: 'LAD 5, SF 3'},
  {game: 'Cubs vs Cardinals', status: 'Pre-game', score: '19:05 ET'}
];
const news = [
  {title: 'Google I/O 2026 6/18 登場', source: '科技新報'},
  {title: '美聯儲利率決定引發市場波動', source: '經濟日報'},
  {title: '新北市建案最新動態', source: '本地社報'}
];

function esc(s) {
  // Simplified escaping for HTML content, removing backtick and slash which are less common causes
  // of SyntaxError and can be problematic with template literals.
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    '\'': '&#39;'
  }[c]));
}

function renderList(id, arr, tmpl) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = arr.map(tmpl).join('');
}

// Render static content
renderList('mlb-list', mlb, m => `<div class="list-item"><div><div class="list-title">${esc(m.game)}</div><div class="meta">${esc(m.status)}</div></div><strong>${esc(m.score)}</strong></div>`);
renderList('news-list', news, n => `<div class="list-item"><div><div class="list-title">${esc(n.title)}</div><div class="meta">${esc(n.source)}</div></div></div>`);

// Fetch and render dynamic AI status and cron jobs
async function fetchHermesStatus() {
  try {
    const response = await fetch('./status.json');
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    const data = await response.json();

    // Render AI Status
    const aiStatusTitle = document.getElementById('ai-status-title');
    if (aiStatusTitle) aiStatusTitle.textContent = `Hermes ${esc(data.assistant)}`; 
    
    const aiStatusMeta = document.getElementById('ai-status-meta');
    if (aiStatusMeta) aiStatusMeta.innerHTML = `模型: ${esc(data.model)} (${esc(data.provider)}) · 今日訊息: ${esc(data.today_messages)}<br>最後更新: ${esc(data.last_updated)}`;
    
    // Render AI Service List (hardcoded for now, based on previous structure)
    // Note: The services array itself contains template literals (`), ensure Python escaping.
    const services = [
      {name: 'Hermes Agent', meta: `Telegram Bot 運行中`, state: data.online ? 'online' : 'offline'},
      {name: 'OpenRouter API', meta: `key 配置完成`, state: 'online'}, // Placeholder, needs actual check
      {name: 'Gemini API', meta: `餘額需人工確認`, state: 'warn'} // Placeholder, needs actual check
    ];
    renderList('ai-service-list', services, s => `<div class="status-row"><span class="dot ${esc(s.state)}"></span><div><div class="list-title">${esc(s.name)}</div><div class="meta">${esc(s.meta)}</div></div></div>`);

    // Render Cron Jobs
    const cronJobsList = document.getElementById('cron-jobs-list');
    if (cronJobsList && data.cron_jobs && data.cron_jobs.length > 0) {
      cronJobsList.innerHTML = data.cron_jobs.map(job => `
        <div class="list-item">
          <div>
            <div class="list-title">${esc(job.name)}</div>
            <div class="meta">排程: ${esc(job.schedule)} · 上次: ${esc(job.last_run)}</div>
          </div>
          <span class="dot ${esc(job.status === '運行中' ? 'online' : 'offline')}"></span>
        </div>
      `).join('');
    } else if (cronJobsList) {
      cronJobsList.innerHTML = '<div class="tile-note">無已設定排程。</div>';
    }

    const refreshInfo = document.getElementById('refresh-info');
    if (refreshInfo) refreshInfo.textContent = `最後更新於: ${esc(data.last_updated)} · 每 15 分鐘自動重整`;

  } catch (error) {
    console.error("Failed to fetch Hermes status:", error);
    const aiStatusTitle = document.getElementById('ai-status-title');
    if (aiStatusTitle) aiStatusTitle.textContent = 'Hermes 狀態異常';
    const aiStatusMeta = document.getElementById('ai-status-meta');
    if (aiStatusMeta) aiStatusMeta.textContent = '無法載入最新狀態。';
    const aiServiceList = document.getElementById('ai-service-list');
    if (aiServiceList) aiServiceList.innerHTML = '<div class="tile-note">無法載入服務列表。</div>';
    const cronJobsList = document.getElementById('cron-jobs-list');
    if (cronJobsList) cronJobsList.innerHTML = '<div class="tile-note">無法載入排程列表。</div>';
    const refreshInfo = document.getElementById('refresh-info');
    if (refreshInfo) refreshInfo.textContent = '無法載入更新資訊。';
  }
}

// Clock update function
function updateClock() {
  const now = new Date();
  document.getElementById('clock-time').textContent = now.toLocaleTimeString('zh-TW', {hour: '2-digit', minute: '2-digit'});
  document.getElementById('clock-date').textContent = now.toLocaleDateString('zh-TW', {weekday: 'long', month: 'long', day: 'numeric'});
}

updateClock();
setInterval(updateClock, 1000 * 30);
fetchHermesStatus(); // Initial fetch
setInterval(fetchHermesStatus, 5 * 60 * 1000); // Fetch every 5 minutes
setTimeout(() => location.reload(), 15 * 60 * 1000);
</script>
</body>
</html>
