<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資訊儀表板</title>
<style>
:root {
  --bg: #0d1117;
  --bg-2: #151b24;
  --ink: #f7fbff;
  --muted: rgba(247, 251, 255, .72);
  --soft: rgba(247, 251, 255, .52);
  --line: rgba(255, 255, 255, .12);
  --blue: #0078d7;
  --cyan: #00a4ef;
  --green: #107c10;
  --purple: #744da9;
  --orange: #d83b01;
  --red: #e81123;
  --tile-radius: 2px;
  --gap: clamp(10px, 1.5vw, 18px);
}
* { box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Roboto, sans-serif;
  background:
    radial-gradient(circle at 12% 10%, rgba(0, 120, 215, .20), transparent 28rem),
    radial-gradient(circle at 86% 18%, rgba(116, 77, 169, .18), transparent 24rem),
    linear-gradient(135deg, var(--bg), var(--bg-2));
  color: var(--ink);
  padding: clamp(16px, 3vw, 34px);
  line-height: 1.35;
}
.dashboard {
  width: min(1180px, 100%);
  margin: 0 auto;
}
.header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: clamp(16px, 2.5vw, 28px);
}
.kicker {
  margin: 0 0 6px;
  color: var(--soft);
  font-size: clamp(12px, 1.4vw, 14px);
  letter-spacing: .14em;
  text-transform: uppercase;
}
h1 {
  margin: 0;
  font-weight: 300;
  letter-spacing: -.04em;
  font-size: clamp(34px, 7vw, 78px);
  line-height: .9;
}
.clock {
  text-align: right;
  min-width: 150px;
}
.clock-time {
  font-size: clamp(30px, 5vw, 58px);
  font-weight: 200;
  letter-spacing: -.06em;
  line-height: 1;
}
.clock-date {
  color: var(--muted);
  margin-top: 8px;
  font-size: 14px;
}
.tile-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  grid-auto-rows: minmax(138px, auto);
  gap: var(--gap);
}
.tile {
  position: relative;
  overflow: hidden;
  min-height: 138px;
  padding: clamp(16px, 2vw, 22px);
  border: 1px solid var(--line);
  border-radius: var(--tile-radius);
  color: white;
  box-shadow: 0 20px 70px rgba(0,0,0,.18);
  isolation: isolate;
}
.tile::after {
  content: "";
  position: absolute;
  inset: auto -35% -55% auto;
  width: 180px;
  aspect-ratio: 1;
  border-radius: 999px;
  background: rgba(255,255,255,.12);
  z-index: -1;
}
.tile:hover { filter: brightness(1.06); }
.tile:focus-within { outline: 2px solid rgba(255,255,255,.85); outline-offset: 3px; }
.tile-blue { background: linear-gradient(135deg, #0063b1, var(--blue)); }
.tile-cyan { background: linear-gradient(135deg, #0086b3, var(--cyan)); }
.tile-green { background: linear-gradient(135deg, #0b6a0b, var(--green)); }
.tile-purple { background: linear-gradient(135deg, #51337f, var(--purple)); }
.tile-orange { background: linear-gradient(135deg, #a93600, var(--orange)); }
.tile-avatar { padding: 0; }
.avatar-link {
  display: flex;
  align-items: center;
  gap: 18px;
  width: 100%;
  height: 100%;
  color: inherit;
  text-decoration: none;
  padding: clamp(16px, 2vw, 22px);
}
.avatar-frame {
  width: clamp(72px, 9vw, 104px);
  height: clamp(72px, 9vw, 104px);
  flex: 0 0 auto;
  border-radius: 50%;
  overflow: hidden;
  background: #0d1117;
  border: 2px solid rgba(255,255,255,.16);
  box-shadow: 0 14px 30px rgba(0,0,0,.28);
}
.avatar-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  filter: saturate(1.04) contrast(1.02);
}
.avatar-copy { min-width: 0; }
.avatar-copy .tile-label { margin-bottom: 10px; }
.avatar-copy .tile-title { margin-bottom: 6px; }
.avatar-copy .tile-note { margin-top: 0; }
.tile-red { background: linear-gradient(135deg, #a80000, var(--red)); }
.tile-dark { background: linear-gradient(135deg, #202735, #111827); }
.tile-wide { grid-column: span 2; }
.tile-tall { grid-row: span 2; }
.tile-full { grid-column: span 6; }
.tile-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
  color: rgba(255,255,255,.78);
  font-size: 19px;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.tile-icon { font-size: 22px; letter-spacing: 0; }
.tile-title {
  margin: 0;
  font-size: clamp(22px, 3.2vw, 40px);
  font-weight: 300;
  letter-spacing: -.04em;
  text-wrap: pretty;
}
.tile-value {
  margin-top: 10px;
  font-size: clamp(34px, 6vw, 76px);
  font-weight: 200;
  letter-spacing: -.07em;
  line-height: .95;
}
.tile-note, .meta {
  color: rgba(255,255,255,.74);
  font-size: 14px;
}
.tile-note { margin-top: 12px; }
.list {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}
.list-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 10px 0;
  border-top: 1px solid rgba(255,255,255,.18);
}
.list-title { font-weight: 650; }
.change-up { color: #b7ffbd; }
.change-down { color: #ffd2d6; }
.status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 0;
  border-top: 1px solid rgba(255,255,255,.18);
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: #8b949e;
  box-shadow: 0 0 0 4px rgba(255,255,255,.08);
}
.dot.online { background: #7ee787; }
.dot.warn { background: #f2cc60; }
.footer {\
  margin-top: 18px;\
  color: var(--soft);\
  font-size: 12px;\
  display: flex;\
  justify-content: space-between;\
  gap: 14px;\
  flex-wrap: wrap;\
}
@media (max-width: 900px) {
  .tile-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .tile-xl { grid-column: span 4; }
  .tile-full { grid-column: span 4; }
}
@media (max-width: 640px) {
  body { padding: 14px; }
  .header { align-items: start; flex-direction: column; }
  .clock { text-align: left; }
  .tile-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); grid-auto-rows: minmax(126px, auto); }
  .tile, .tile-wide, .tile-xl, .tile-tall, .tile-full { grid-column: span 2; grid-row: auto; }
  .tile.compact { grid-column: span 1; }
}
@media (max-width: 380px) {
  .tile-grid { grid-template-columns: 1fr; }
  .tile, .tile-wide, .tile-xl, .tile-tall, .tile-full, .tile.compact { grid-column: span 1; }
}
@media (prefers-reduced-motion: no-preference) {
  .tile { transition: transform .18s ease, filter .18s ease; }
  .tile:hover { transform: translateY(-2px); }
}
</style>
</head>
<body>
<main class="dashboard">
  <header class="header">
    <div>
      <p class="kicker">Placeholder Dashboard</p>
      <h1>今日資訊</h1>
    </div>
    <div class="clock" aria-label="目前時間">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-date" id="clock-date">載入中</div>
    </div>
  </header>

  <section class="tile-grid" aria-label="資訊方格">
    <article class="tile tile-xl tile-blue">
      <div class="tile-label"><span>MLB</span><span class="tile-icon">⚾</span></div>
      <h2 class="tile-title">Yankees vs Red Sox</h2>
      <div class="tile-value">3–2</div>
      <p class="tile-note">7th inning · NYY 領先</p>
      <div class="list" id="mlb-list"></div>
    </article>

    <article class="tile tile-wide tile-green tile-avatar">
      <a class="avatar-link" id="telegram-link" href="https://t.me/venat_bot" target="_blank" rel="noopener noreferrer">
        <div class="avatar-frame" aria-hidden="true">
          <img class="avatar-image" src="./assets/venat-avatar.jpg" alt="Venat avatar">
        </div>
        <div class="avatar-copy">
          <div class="tile-label"><span>venat</span><span class="tile-icon">bot</span></div>
          <h2 class="tile-title" id="assistant-title">傾聽、感受、思考</h2>
          <p class="tile-note" id="assistant-note">點我開啟 Telegram</p>
        </div>
      </a>
    </article>

    <article class="tile tile-wide tile-orange">
      <div class="tile-label"><span>天氣</span><span class="tile-icon">☁</span></div>
      <h2 class="tile-title" id="weather-title">新北</h2>
      <div class="tile-value" id="weather-value">—</div>
      <p class="tile-note" id="weather-note">載入中...</p>
    </article>

    <article class="tile tile-wide tile-cyan">
      <div class="tile-label"><span>最新新聞</span><span class="tile-icon">📰</span></div>
      <h2 class="tile-title">科技熱點</h2>
      <div class="list" id="news-list"></div>
    </article>

    <article class="tile tile-tall tile-dark tile-wide">
      <div class="tile-label"><span>AI 狀態</span><span class="tile-icon">🤖</span></div>
      <h2 class="tile-title" id="ai-status-title">載入中...</h2>
      <div id="ai-status-meta" class="tile-note"></div>
      <div id="ai-service-list" class="list"></div>
    </article>

    <article class="tile tile-wide tile-red">
      <div class="tile-label"><span>自動排程</span><span class="tile-icon">⏱</span></div>
      <h2 class="tile-title">排程列表</h2>
      <div id="cron-jobs-list" class="list"></div>
    </article>
  </section>

  <footer class="footer">
    <span>版型：Windows Phone / Metro 方格風格 · RWD</span>
    <span id="refresh-info">每 15 分鐘自動重整 · Placeholder data</span>
  </footer>
</main>

<script>
const state = {
  weather: null,
  mlb: null,
  news: null,
  hermes: null,
};

const WEATHER_CODES = {
  0: '晴朗',
  1: '多雲',
  2: '局部多雲',
  3: '陰天',
  45: '有霧',
  48: '霧凇',
  51: '毛毛雨',
  53: '毛毛雨',
  55: '毛毛雨',
  61: '小雨',
  63: '中雨',
  65: '大雨',
  66: '凍雨',
  67: '凍雨',
  71: '小雪',
  73: '中雪',
  75: '大雪',
  77: '雪粒',
  80: '短暫陣雨',
  81: '陣雨',
  82: '強陣雨',
  85: '短暫降雪',
  86: '大雪',
  95: '雷雨',
  96: '雷雨夾冰雹',
  99: '強雷雨夾冰雹'
};

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

function renderList(id, arr, tmpl) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = arr.map(tmpl).join('');
}

function weatherLabel(code) {
  return WEATHER_CODES[code] || '天氣更新';
}

function updateSummary() {
  const title = document.getElementById('assistant-title');
  const note = document.getElementById('assistant-note');
  const link = document.getElementById('telegram-link');
  if (link) {
    const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent('Venat')}`;
    link.href = shareUrl;
  }

  if (!title || !note) return;

  const weatherText = state.weather?.temp != null ? `${state.weather.temp}°` : '—';
  const mlbText = state.mlb ? `${state.mlb.count} 場` : '—';
  const newsText = state.news ? `${state.news.count} 則` : '—';

  if (!state.weather && !state.mlb && !state.news) {
    title.textContent = '傾聽、感受、思考';
    note.textContent = '點我開啟 Telegram';
    return;
  }

  title.textContent = `${weatherText}｜${mlbText}｜${newsText}`;
  note.textContent = '公開資訊已同步';
}

async function fetchWeather() {
  const title = document.getElementById('weather-title');
  const value = document.getElementById('weather-value');
  const note = document.getElementById('weather-note');
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=25.017&longitude=121.462&current=temperature_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia%2FTaipei';
    const res = await fetch(url);
    if (!res.ok) throw new Error(`weather HTTP ${res.status}`);
    const data = await res.json();
    const current = data.current || {};
    const daily = data.daily || {};
    const code = current.weather_code ?? daily.weather_code?.[0];
    const temp = current.temperature_2m ?? daily.temperature_2m_max?.[0];
    const wind = current.wind_speed_10m;

    state.weather = {
      temp: temp != null ? Math.round(temp) : null,
      label: weatherLabel(code),
      wind: wind != null ? Math.round(wind) : null,
      max: daily.temperature_2m_max?.[0] != null ? Math.round(daily.temperature_2m_max[0]) : null,
      min: daily.temperature_2m_min?.[0] != null ? Math.round(daily.temperature_2m_min[0]) : null,
    };

    if (title) title.textContent = `新北 · ${state.weather.label}`;
    if (value) value.textContent = state.weather.temp != null ? `${state.weather.temp}°` : '—';
    if (note) note.textContent = state.weather.wind != null
      ? `風速 ${state.weather.wind} km/h · 高 ${state.weather.max ?? '—'}° / 低 ${state.weather.min ?? '—'}°`
      : `高 ${state.weather.max ?? '—'}° / 低 ${state.weather.min ?? '—'}°`;

    updateSummary();
  } catch (error) {
    console.error('Failed to fetch weather:', error);
    if (title) title.textContent = '新北';
    if (value) value.textContent = '—';
    if (note) note.textContent = '天氣載入失敗';
  }
}

async function fetchMLB() {
  const listEl = document.getElementById('mlb-list');
  const titleEl = document.querySelector('.tile-blue .tile-title');
  const valueEl = document.querySelector('.tile-blue .tile-value');
  const noteEl = document.querySelector('.tile-blue .tile-note');
  try {
    const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
    const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=team,linescore,decisions`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`mlb HTTP ${res.status}`);
    const data = await res.json();
    const games = data.dates?.[0]?.games || [];

    state.mlb = { count: games.length };

    if (titleEl) titleEl.textContent = games.length ? `今日 MLB · ${games.length} 場` : '今日 MLB';
    if (valueEl) valueEl.textContent = games.length ? `${games.length} 場` : '0 場';
    if (noteEl) noteEl.textContent = games.length ? '點開可看即時比分摘要' : '今天沒有賽事';

    if (listEl) {
      if (!games.length) {
        listEl.innerHTML = '<div class="tile-note">今天沒有 MLB 賽事。</div>';
      } else {
        listEl.innerHTML = games.slice(0, 3).map(game => {
          const away = game.teams?.away?.team?.name || 'Away';
          const home = game.teams?.home?.team?.name || 'Home';
          const awayScore = game.teams?.away?.score;
          const homeScore = game.teams?.home?.score;
          const stateText = game.status?.detailedState || game.status?.abstractGameState || 'N/A';
          const timeText = game.gameDate ? new Date(game.gameDate).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Taipei' }) : '';
          const line = (awayScore != null && homeScore != null) ? `${awayScore} - ${homeScore}` : (game.gameNumber ? `Game ${game.gameNumber}` : '');
          return `<div class="list-item"><div><div class="list-title">${esc(away)} @ ${esc(home)}</div><div class="meta">${esc(stateText)}${timeText ? ` · ${esc(timeText)}` : ''}</div></div><strong>${esc(line || '—')}</strong></div>`;
        }).join('');
      }
    }

    updateSummary();
  } catch (error) {
    console.error('Failed to fetch MLB:', error);
    if (listEl) listEl.innerHTML = '<div class="tile-note">MLB 資料載入失敗。</div>';
    if (titleEl) titleEl.textContent = '今日 MLB';
    if (valueEl) valueEl.textContent = '—';
    if (noteEl) noteEl.textContent = '無法取得賽事';
  }
}

async function fetchNews() {
  const listEl = document.getElementById('news-list');
  try {
    const url = 'https://hn.algolia.com/api/v1/search_by_date?tags=story&hitsPerPage=3';
    const res = await fetch(url);
    if (!res.ok) throw new Error(`news HTTP ${res.status}`);
    const data = await res.json();
    const hits = data.hits || [];

    state.news = { count: hits.length };

    if (listEl) {
      if (!hits.length) {
        listEl.innerHTML = '<div class="tile-note">沒有新聞資料。</div>';
      } else {
        listEl.innerHTML = hits.map(hit => {
          const title = hit.title || hit.story_title || '未命名標題';
          const source = hit.author ? `by ${hit.author}` : 'Hacker News';
          const link = hit.url || hit.story_url || `https://news.ycombinator.com/item?id=${hit.objectID}`;
          return `<a class="list-item" href="${esc(link)}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;color:inherit;"><div><div class="list-title">${esc(title)}</div><div class="meta">${esc(source)}</div></div><strong>↗</strong></a>`;
        }).join('');
      }
    }

    updateSummary();
  } catch (error) {
    console.error('Failed to fetch news:', error);
    if (listEl) listEl.innerHTML = '<div class="tile-note">新聞資料載入失敗。</div>';
  }
}

async function fetchHermesStatus() {
  try {
    const response = await fetch('./status.json');
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const data = await response.json();

    state.hermes = {
      assistant: data.assistant || 'Venat',
      model: data.model || 'N/A',
      provider: data.provider || 'N/A',
      today_messages: data.today_messages ?? 'N/A',
      last_updated: data.last_updated || 'N/A',
    };

    const aiStatusTitle = document.getElementById('ai-status-title');
    if (aiStatusTitle) aiStatusTitle.textContent = `Hermes ${esc(state.hermes.assistant)}`;

    const aiStatusMeta = document.getElementById('ai-status-meta');
    if (aiStatusMeta) aiStatusMeta.innerHTML = `模型: ${esc(state.hermes.model)} (${esc(state.hermes.provider)}) · 今日訊息: ${esc(state.hermes.today_messages)}<br>最後更新: ${esc(state.hermes.last_updated)}`;

    const services = [
      {name: 'Hermes Agent', meta: 'Telegram Bot 運行中', state: data.online ? 'online' : 'warn'},
      {name: 'OpenRouter API', meta: '已連線', state: 'online'},
      {name: 'Gemini API', meta: '餘額待確認', state: 'warn'}
    ];
    renderList('ai-service-list', services, s => `<div class="status-row"><span class="dot ${esc(s.state)}"></span><div><div class="list-title">${esc(s.name)}</div><div class="meta">${esc(s.meta)}</div></div></div>`);

    const cronJobsList = document.getElementById('cron-jobs-list');
    if (cronJobsList && data.cron_jobs && data.cron_jobs.length > 0) {
      cronJobsList.innerHTML = data.cron_jobs.map(job => `
        <div class="list-item">
          <div>
            <div class="list-title">${esc(job.name)}</div>
            <div class="meta">排程: ${esc(job.schedule)} · 上次: ${esc(job.last_run)}</div>
          </div>
          <span class="dot ${esc(job.status === '運行中' ? 'online' : 'warn')}"></span>
        </div>
      `).join('');
    } else if (cronJobsList) {
      cronJobsList.innerHTML = '<div class="tile-note">無已設定排程。</div>';
    }

    const refreshInfo = document.getElementById('refresh-info');
    if (refreshInfo) refreshInfo.textContent = `最後更新於: ${esc(state.hermes.last_updated)} · 每 15 分鐘自動重整`;

    updateSummary();
  } catch (error) {
    console.error('Failed to fetch Hermes status:', error);
    const aiStatusTitle = document.getElementById('ai-status-title');
    if (aiStatusTitle) aiStatusTitle.textContent = 'Hermes 狀態異常';
    const aiStatusMeta = document.getElementById('ai-status-meta');
    if (aiStatusMeta) aiStatusMeta.textContent = '無法載入最新狀態。';
    const aiServiceList = document.getElementById('ai-service-list');
    if (aiServiceList) aiServiceList.innerHTML = '<div class="tile-note">無法載入服務列表。</div>';
    const cronJobsList = document.getElementById('cron-jobs-list');
    if (cronJobsList) cronJobsList.innerHTML = '<div class="tile-note">無法載入排程列表。</div>';
    const refreshInfo = document.getElementById('refresh-info');
    if (refreshInfo) refreshInfo.textContent = '無法載入更新資訊。';
  }
}

function updateClock() {
  const now = new Date();
  const timeEl = document.getElementById('clock-time');
  const dateEl = document.getElementById('clock-date');
  if (timeEl) timeEl.textContent = now.toLocaleTimeString('zh-TW', {hour: '2-digit', minute: '2-digit'});
  if (dateEl) dateEl.textContent = now.toLocaleDateString('zh-TW', {weekday: 'long', month: 'long', day: 'numeric'});
}

updateClock();
setInterval(updateClock, 1000 * 30);
fetchWeather();
fetchMLB();
fetchNews();
fetchHermesStatus();
setInterval(fetchWeather, 10 * 60 * 1000);
setInterval(fetchMLB, 10 * 60 * 1000);
setInterval(fetchNews, 10 * 60 * 1000);
setInterval(fetchHermesStatus, 5 * 60 * 1000);
setTimeout(() => location.reload(), 15 * 60 * 1000);
</script>
</body>
</html>
